  </g>

  <text x="250" y="258" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="800" letter-spacing="-3" fill="#ffffff">Reframe</text>
  <text x="254" y="312" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="500" fill="#ffffff" fill-opacity="0.9">CBT thought records, kept private</text>
